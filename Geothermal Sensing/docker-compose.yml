version: '3.8'

services:
  mosquitto:
    image: eclipse-mosquitto:latest
    container_name: mosquitto
    ports:
      - "1883:1883"
    volumes:
      - /volume1/docker/geothermal/mosquitto/config:/mosquitto/config
      - /volume1/docker/geothermal/mosquitto/data:/mosquitto/data
      - /volume1/docker/geothermal/mosquitto/log:/mosquitto/log

  influxdb:
    image: influxdb:latest
    container_name: influxdb
    ports:
      - "8086:8086"
    volumes:
      - /volume1/docker/geothermal/influxdb_data:/var/lib/influxdb2
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=apklop
      - DOCKER_INFLUXDB_INIT_PASSWORD=cs489Admin
      - DOCKER_INFLUXDB_INIT_ORG=Geothermal
      - DOCKER_INFLUXDB_INIT_BUCKET=Temperatures
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=N5mm205zSmBVu_asM-64g9UPAQMrNkntOmQA5hGYVaLr_4upNH267OV4mEaP8k_283k5e6uOriqRX86cxjbp7w==

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - /volume1/docker/geothermal/grafana_data:/var/lib/grafana

  telegraf:
    image: telegraf:latest
    container_name: telegraf
    depends_on:
      - mosquitto
      - influxdb
    volumes:
      - /volume1/docker/geothermal/telegraf/telegraf.conf:/etc/telegraf/telegraf.conf:ro

volumes:
  influxdb_data:
  grafana_data: